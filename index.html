<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#7D4E66">
<title>ACCCOM Studio — Audit &amp; plan d'action commercial</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<style>html,body{margin:0;padding:0;background:#FAF7F5;}#boot{font-family:sans-serif;color:#7D6D71;text-align:center;padding:80px 20px;}</style>
</head>
<body>
<div id="root"><div id="boot">Chargement d'ACCCOM Studio…</div></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useLayoutEffect } = React;

/* ============================================================
   ACCCOM · Studio d'audit commercial
   - Accueil : nouvel audit / dossiers clients
   - Formulaire d'audit (analyse interne / externe / objectifs)
   - Génération IA : SWOT + plan d'action 30·60·90 (un document)
   - Dossiers clients : audit, document généré, pièces ajoutées
   Stockage persistant : window.storage
   ============================================================ */

const FONTS = `
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@700;800&family=Onest:wght@300;400;500;600;700&display=swap');
`;

const CSS = `
${FONTS}
:root{
  /* Identité chromatique : la palette du tube (plum / coral / ocre) devient
     la palette générale de l'outil. --pine/--pine-soft/--pine-hover/--sage
     sont conservées comme noms internes (repris dans des dizaines de règles)
     mais leurs valeurs sont désormais puisées dans cette palette — le vert
     a disparu des zones de texte, boutons, libellés et bordures. */
  --ink:#241820; --pine:var(--plum); --pine-soft:var(--coral-ink); --pine-hover:var(--plum-deep);
  --sage:#C9A2A8; --mist:#F5EAE7; --mist-2:#FAF3F0;
  --paper:#FAF7F5; --card:#FFFFFF;
  --gold:#C2A06A; --gold-deep:#A9834B; --gold-light:#E7CF9F;
  --plum:#7D4E66; --plum-deep:#5A3348; --coral:#D96A4B; --coral-ink:#A84A32; --ocre:#E0AA52; --ocre-light:#EFD199;
  --line:#E8DAD5; --danger:#A85B4B; --amber:#B98A4E; --blue:#5E7E9B;
  --muted:#6B5A5E; --muted2:#7D6D71; --faint:#96878A; --deep:#3C2A2F; --deep2:#4B393E;
  --topbar:rgba(250,247,245,.85); --input-bg:#FDF9F8; --input-focus:#FFFFFF;
  --shadow:0 10px 30px rgba(40,20,28,.08), 0 2px 6px rgba(40,20,28,.05);
}
/* ---- mode sombre ---- */
.acd.dark{
  /* même logique en mode sombre : fonds et bordures chauds, --pine/--pine-soft
     puisés dans le plum/corail (déjà assez lumineux sur fond sombre pour
     rester lisibles, pas besoin d'une teinte -ink séparée ici). */
  --ink:#F3E7EB; --pine:var(--plum); --pine-soft:var(--coral); --pine-hover:var(--plum-deep);
  --sage:#6B4E54; --mist:#2A1E22; --mist-2:#221A1D;
  --paper:#17110F; --card:#1F1719;
  --line:#3A2A2E; --muted:#C9B3B8; --muted2:#B39EA2; --faint:#8C787B; --deep:#EEDEE2; --deep2:#E0CDD1;
  --gold:#D2B075; --gold-deep:#BC9558; --gold-light:#EEDBB0;
  --plum:#976382; --plum-deep:#7A4E68; --coral:#E5805F; --coral-ink:#E5805F; --ocre:#ECBD68; --ocre-light:#F5DCA0;
  --topbar:rgba(23,17,15,.85); --input-bg:#1C1416; --input-focus:#241A1D;
  --shadow:0 10px 30px rgba(15,5,8,.4), 0 2px 6px rgba(15,5,8,.3);
}
.acd.dark .pill.wait{ background:#332B1D; color:#D8B274;}
.acd.dark .err{ background:#33221E; border-color:#5A3A32; color:#E0947F;}
/* Le document client reste sur fond clair, même en mode sombre :
   il conserve son rendu d'impression et de présentation. */
.docsheet{
  /* le document imprimé reste toujours clair, avec la même palette chaude
     que l'interface — plus de vert nulle part. */
  --ink:#241820; --pine:#7D4E66; --pine-soft:#A84A32; --sage:#C9A2A8;
  --mist:#F5EAE7; --mist-2:#FAF3F0; --line:#E8DAD5;
  --gold:#C2A06A; --gold-deep:#A9834B; --gold-light:#E7CF9F;
  --plum:#7D4E66; --plum-deep:#5A3348; --coral:#D96A4B; --coral-ink:#A84A32; --ocre:#E0AA52; --ocre-light:#EFD199;
  --muted:#6B5A5E; --muted2:#7D6D71; --faint:#96878A; --deep:#3C2A2F; --deep2:#4B393E;
  color:#241820;
}
*{box-sizing:border-box; margin:0; padding:0;}
.acd{ min-height:100vh; background:var(--paper); color:var(--ink);
  font-family:'Onest',sans-serif; font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;}
.acd h1,.acd h2,.acd h3,.serif{ font-family:'Instrument Serif',serif; font-weight:400; letter-spacing:.2px;}
.wrap{max-width:1060px; margin:0 auto; padding:0 28px;}

/* ---- top bar ---- */
.topbar{ position:sticky; top:0; z-index:40; background:var(--topbar);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
.topbar-in{ display:flex; align-items:center; justify-content:space-between; height:64px;}
.wordmark{ display:flex; align-items:center; gap:12px; cursor:pointer;}
.wordmark .tag{ font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--sage);}

/* ---- logo ACCCOM : image de marque contemporaine.
   Typo Syne ExtraBold — large, géométrique, dessin singulier : le mot
   devient une signature reconnaissable. Le tube (du 1er C au O) est
   traité en color-blocking : une couleur pleine par section entre les
   arceaux — prune à l'entrée, corail au cœur, ocre vers la sortie —
   progression chaude qui monte vers la lumière (le O en blanc franc,
   baigné d'un halo). Les arceaux en encre enserrent et dépassent le
   tube. Palette élargie : vert sapin + prune / corail / ocre. ---- */
.logo{ color:var(--ink); display:inline-block; vertical-align:middle;}
.logo .lg{ font-family:'Syne',sans-serif; font-weight:800; font-size:46px; fill:currentColor; letter-spacing:0;}
.crumb{ font-size:13px; color:var(--pine-soft); display:flex; gap:8px; align-items:center;}
.crumb button{ background:none; border:none; color:var(--pine-soft); cursor:pointer; font:inherit;}
.crumb button:hover{ color:var(--ink); text-decoration:underline;}
.theme-btn{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:var(--card);
  color:var(--pine); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .18s; flex-shrink:0;}
.theme-btn:hover{ border-color:var(--sage); transform:rotate(15deg);}
.theme-btn:focus-visible{ outline:2px solid var(--pine); outline-offset:2px;}

/* ---- buttons ---- */
.btn{ border:none; cursor:pointer; font-family:'Onest',sans-serif; font-weight:500;
  border-radius:12px; transition:all .18s ease; display:inline-flex; align-items:center; gap:8px;}
.btn:focus-visible{ outline:2px solid var(--pine); outline-offset:2px;}
.btn-primary{ background:var(--pine); color:#fff; padding:13px 26px; font-size:15px;}
.btn-primary:hover{ background:var(--pine-hover); transform:translateY(-1px);}
.btn-primary:disabled{ opacity:.45; cursor:default; transform:none;}
.btn-ghost{ background:transparent; color:var(--pine); padding:11px 20px; font-size:14px; border:1px solid var(--line);}
.btn-ghost:hover{ border-color:var(--sage); background:var(--mist-2);}
.btn-soft{ background:var(--mist); color:var(--pine); padding:10px 18px; font-size:14px;}
.btn-soft:hover{ background:var(--sage); color:#fff;}
.btn-danger{ background:transparent; color:var(--danger); padding:8px 14px; font-size:13px; border:1px solid transparent;}
.btn-danger:hover{ border-color:var(--danger);}

/* ---- home ---- */
.hero{ padding:64px 0 40px; text-align:left;}
.hero .logo{ margin-bottom:26px;}
.hero .eyebrow{ font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--pine-soft); margin-bottom:14px;}
.hero h1{ font-size:52px; line-height:1.08; max-width:640px;}
.hero h1 em{ font-style:italic; color:var(--pine-soft);}
.hero p{ margin-top:16px; color:var(--muted); max-width:520px;}
.home-cards{ display:grid; grid-template-columns:1fr 1fr; gap:22px; padding:34px 0 80px;}
.home-card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:34px 32px;
  cursor:pointer; transition:all .2s ease; box-shadow:var(--shadow); position:relative; overflow:hidden; text-align:left;}
.home-card:hover{ transform:translateY(-3px); border-color:var(--sage);}
.home-card .num{ font-family:'Instrument Serif',serif; font-size:15px; color:var(--sage); letter-spacing:2px;}
.home-card h2{ font-size:30px; margin:10px 0 8px;}
.home-card p{ color:var(--muted); font-size:14px;}
.home-card .go{ margin-top:22px; color:var(--pine); font-weight:600; font-size:14px;}
.home-card .halo{ position:absolute; right:-40px; top:-40px; width:150px; height:150px; border-radius:50%;
  background:radial-gradient(circle, var(--mist) 0%, transparent 70%);}
/* Les deux cartes d'accueil reprennent la progression prune → ocre du logo */
.home-card:nth-child(1) .num{ color:var(--plum);}
.home-card:nth-child(1) .halo{ background:radial-gradient(circle, color-mix(in srgb, var(--plum) 20%, transparent) 0%, transparent 70%);}
.home-card:nth-child(2) .num{ color:var(--ocre);}
.home-card:nth-child(2) .halo{ background:radial-gradient(circle, color-mix(in srgb, var(--ocre) 24%, transparent) 0%, transparent 70%);}
.cadence{ display:flex; gap:14px; align-items:center; padding:0 0 70px; color:var(--pine-soft); font-size:13px;}
.cadence .dot{ width:9px; height:9px; border-radius:50%; background:var(--sage);}
.cadence .dot.dot-a{ background:var(--plum);}
.cadence .dot.dot-b{ background:var(--ocre);}
.cadence .rail{ flex:1; height:2px; background:linear-gradient(90deg, var(--plum), var(--coral), var(--ocre)); opacity:.4; border-radius:2px;}
.cadence b{ font-family:'Instrument Serif',serif; font-size:17px; font-weight:400; color:var(--ink);}

/* ---- form ---- */
.page-head{ padding:44px 0 10px;}
.page-head h1{ font-size:38px;}
.page-head p{ color:var(--muted); margin-top:8px; max-width:640px;}
.steps{ display:flex; gap:6px; margin:26px 0 8px; flex-wrap:wrap;}
.step{ padding:8px 16px; border-radius:999px; font-size:13px; cursor:pointer; border:1px solid var(--line);
  background:transparent; color:var(--muted); font-family:'Onest',sans-serif;}
.step.active{ background:var(--pine); color:#fff; border-color:var(--pine);}
.step.done{ border-color:var(--sage); color:var(--pine);}
.fcard{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:30px; margin:18px 0; box-shadow:var(--shadow);}
.fcard h3{ font-size:23px; margin-bottom:4px;}
.fcard .sub{ font-size:13px; color:var(--muted2); margin-bottom:20px;}
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;}
.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px;}
.field label{ font-size:12.5px; font-weight:600; color:var(--pine); letter-spacing:.3px;}
.field .hint{ font-size:11.5px; color:var(--faint); font-weight:400;}
.field input,.field textarea,.field select{ font-family:'Onest',sans-serif; font-size:14px; color:var(--ink);
  border:1px solid var(--line); border-radius:10px; padding:11px 13px; background:var(--input-bg); transition:border .15s;}
.field textarea{ min-height:88px; resize:vertical; line-height:1.5;}
.field input:focus,.field textarea:focus,.field select:focus{ outline:none; border-color:var(--sage); background:var(--input-focus);}
.duree{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
.duree button{ color:var(--ink); border:1px solid var(--line); background:var(--input-bg); border-radius:14px; padding:16px; cursor:pointer;
  font-family:'Onest',sans-serif; text-align:left; transition:all .15s;}
.duree button.sel{ border-color:var(--pine); background:var(--mist); box-shadow:inset 0 0 0 1px var(--pine);}
.duree .d-num{ font-family:'Instrument Serif',serif; font-size:26px; color:var(--pine);}
.duree .d-lab{ font-size:12px; color:var(--muted2); margin-top:2px;}
/* Les 3 formules reprennent la progression prune → corail → ocre du tube du logo */
.duree button.sel.d-0{ border-color:var(--plum); background:color-mix(in srgb, var(--plum) 12%, var(--input-bg)); box-shadow:inset 0 0 0 1px var(--plum);}
.duree button.sel.d-0 .d-num{ color:var(--plum);}
.duree button.sel.d-1{ border-color:var(--coral); background:color-mix(in srgb, var(--coral) 12%, var(--input-bg)); box-shadow:inset 0 0 0 1px var(--coral);}
.duree button.sel.d-1 .d-num{ color:var(--coral);}
.duree button.sel.d-2{ border-color:var(--ocre); background:color-mix(in srgb, var(--ocre) 14%, var(--input-bg)); box-shadow:inset 0 0 0 1px var(--ocre);}
.duree button.sel.d-2 .d-num{ color:var(--ocre);}
.form-nav{ display:flex; justify-content:space-between; padding:8px 0 70px;}

/* ---- clients ---- */
.client-row{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 24px;
  display:flex; align-items:center; gap:18px; margin-bottom:12px; cursor:pointer; transition:all .18s; box-shadow:var(--shadow);}
.client-row:hover{ border-color:var(--sage); transform:translateX(3px);}
.avatar{ width:46px; height:46px; border-radius:14px; background:var(--mist); color:var(--pine);
  display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif',serif; font-size:20px; flex-shrink:0;}
.client-row .meta{ flex:1;}
.client-row .meta b{ font-size:16px;}
.client-row .meta span{ display:block; font-size:12.5px; color:var(--muted2); margin-top:2px;}
.pill{ font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; border-radius:999px;}
.pill.ok{ background:var(--mist); color:var(--pine);}
.pill.wait{ background:#F5EFE3; color:var(--amber);}
.empty{ text-align:center; padding:70px 20px; color:var(--muted2);}
.empty .big{ font-family:'Instrument Serif',serif; font-size:26px; color:var(--ink); margin-bottom:8px;}

/* ---- client detail ---- */
.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin:24px 0;}
.tab{ background:none; border:none; padding:12px 18px; font-family:'Onest',sans-serif; font-size:14px;
  color:var(--muted2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;}
.tab.active{ color:var(--ink); border-color:var(--pine); font-weight:600;}
.doc-row{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 22px; margin-bottom:10px;}
.doc-row .d-head{ display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.doc-row .d-head b{ font-size:15px;}
.doc-row .d-head span{ font-size:12px; color:var(--faint);}
.doc-row .d-body{ margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); font-size:14px; white-space:pre-wrap; color:var(--deep);}
.kv{ display:grid; grid-template-columns:220px 1fr; gap:8px 18px; font-size:14px;}
.kv dt{ color:var(--muted2); font-size:12.5px; font-weight:600; padding-top:2px;}
.kv dd{ white-space:pre-wrap;}

/* ---- generation / document ---- */
.gen-overlay{ text-align:center; padding:90px 20px;}
.gen-overlay .spin{ width:52px; height:52px; border-radius:50%; border:3px solid var(--mist);
  border-top-color:var(--pine); margin:0 auto 24px; animation:spin 1s linear infinite;}
@keyframes spin{ to{ transform:rotate(360deg);} }
.gen-overlay h2{ font-size:30px;}
.gen-overlay p{ color:var(--muted2); margin-top:8px;}

.docsheet{ background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow);
  padding:54px 58px; margin:20px 0 40px;}
.doc-brand{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--ink); padding-bottom:18px;}
.doc-brand .ref{ text-align:right; font-size:11.5px; color:var(--muted2); letter-spacing:1px; text-transform:uppercase; line-height:1.7;}
.doc-title{ padding:34px 0 8px;}
.doc-title .eyebrow{ font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--pine-soft);}
.doc-title h1{ font-size:40px; line-height:1.1; margin-top:8px;}
.doc-title h1 em{ font-style:italic; color:var(--pine-soft);}
.synth{ background:var(--mist-2); border-left:3px solid var(--sage); padding:18px 22px; border-radius:0 12px 12px 0;
  font-size:14.5px; color:var(--deep); margin:18px 0 8px;}
.sec-title{ display:flex; align-items:center; gap:14px; margin:42px 0 18px;}
.sec-title h2{ font-size:26px; white-space:nowrap;}
.sec-title .rule{ flex:1; height:1px; background:var(--line);}
.sec-title .lab{ font-size:10.5px; letter-spacing:2.5px; text-transform:uppercase; color:var(--sage);}

.externe{ display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.ext-block{ border:1px solid #E8DAD5; border-radius:14px; padding:18px 20px; background:#FDFAF9;}
.ext-block h4{ font-family:'Onest',sans-serif; font-size:11.5px; letter-spacing:2px; text-transform:uppercase; color:var(--pine-soft); margin-bottom:8px;}
.ext-block p{ font-size:13px; color:var(--deep); line-height:1.55;}

.swot{ display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.swot-cell{ border-radius:16px; padding:22px;}
.swot-cell h4{ font-family:'Onest',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.swot-cell h4 .sq{ width:8px; height:8px; border-radius:2px;}
.swot-cell ul{ list-style:none; display:flex; flex-direction:column; gap:10px;}
.swot-cell li b{ font-size:13.5px; display:block;}
.swot-cell li span{ font-size:12.5px; color:var(--deep2); line-height:1.45;}
.sw-f{ background:#EDF3EC;} .sw-f h4{ color:#3E6B4F;} .sw-f .sq{ background:#3E6B4F;}
.sw-w{ background:#F6EFE7;} .sw-w h4{ color:#A0754A;} .sw-w .sq{ background:#A0754A;}
.sw-o{ background:#EBF1F5;} .sw-o h4{ color:#4A6E8C;} .sw-o .sq{ background:#4A6E8C;}
.sw-m{ background:#F5ECEA;} .sw-m h4{ color:#A05B4B;} .sw-m .sq{ background:#A05B4B;}

.axes{ display:flex; flex-direction:column; gap:10px; margin-top:6px;}
.axe{ display:flex; gap:14px; align-items:baseline; font-size:14.5px;}
.axe .n{ font-family:'Instrument Serif',serif; color:var(--sage); font-size:18px; min-width:26px;}

.phase{ margin-bottom:34px; page-break-inside:avoid;}
.phase-head{ display:flex; align-items:baseline; gap:16px; padding-bottom:10px; border-bottom:2px solid var(--pine); margin-bottom:16px;}
.phase-head .p-num{ font-family:'Instrument Serif',serif; font-size:34px; color:var(--pine);}
.phase-head .p-per{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2);}
.phase-head .p-obj{ margin-left:auto; font-size:13px; color:var(--deep); max-width:46%; text-align:right; font-style:italic; font-family:'Instrument Serif',serif; font-size:16px;}
/* Les 3 phases (J30 · J60 · J90) reprennent la progression prune → corail → ocre du logo */
.phase.ph-0 .phase-head{ border-bottom-color:var(--plum);} .phase.ph-0 .p-num{ color:var(--plum);}
.phase.ph-1 .phase-head{ border-bottom-color:var(--coral);} .phase.ph-1 .p-num{ color:var(--coral);}
.phase.ph-2 .phase-head{ border-bottom-color:var(--ocre);} .phase.ph-2 .p-num{ color:var(--ocre);}
.action{ display:grid; grid-template-columns:26px 1fr 200px; gap:14px; padding:13px 0; border-bottom:1px dashed var(--line);}
.action:last-child{ border-bottom:none;}
.action .a-n{ font-family:'Instrument Serif',serif; color:var(--sage); font-size:17px;}
.action b{ font-size:14px; display:block;}
.action p{ font-size:13px; color:var(--deep2); margin-top:3px;}
.action .a-kpi{ font-size:12px; color:var(--pine); background:var(--mist-2); border-radius:10px; padding:9px 12px; align-self:start;}
.action .a-kpi small{ display:block; letter-spacing:1.5px; text-transform:uppercase; font-size:9.5px; color:var(--faint); margin-bottom:3px;}
.livrables{ margin-top:14px; font-size:13px; color:var(--deep); background:#FCF8F6; border:1px solid #E8DAD5; border-radius:12px; padding:12px 16px;}
.livrables b{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--pine-soft);}
.doc-foot{ margin-top:46px; padding-top:16px; border-top:1px solid var(--line); display:flex; justify-content:space-between;
  font-size:11px; color:var(--faint); letter-spacing:1px; text-transform:uppercase;}
.doc-actions{ display:flex; gap:10px; margin:6px 0 14px; flex-wrap:wrap;}
.err{ background:#F7ECEA; border:1px solid #E3C6BF; color:var(--danger); border-radius:12px; padding:14px 18px; font-size:14px; margin:14px 0;}

/* Répare un JSON tronqué : ferme les chaînes et les crochets restés ouverts. */
function parseJsonLoose(text) {
  let s = text.replace(/```json|```/g, "").trim();
  const start = s.indexOf("{");
  if (start === -1) throw new Error("Aucun JSON dans la réponse");
  s = s.slice(start);
  const end = s.lastIndexOf("}");
  // 1er essai : parse direct sur la portion la plus large
  if (end !== -1) {
    try { return JSON.parse(s.slice(0, end + 1)); } catch (_) { /* on répare */ }
  }
  // Réparation : équilibrage des chaînes et des crochets
  const stack = [];
  let inStr = false, esc = false, lastSafe = 0;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inStr) {
      if (esc) esc = false;
      else if (c === "\\") esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') inStr = true;
    else if (c === "{" ) stack.push("}");
    else if (c === "[") stack.push("]");
    else if (c === "}" || c === "]") { stack.pop(); lastSafe = i; }
    else if (c === ",") lastSafe = i;
  }
  let repaired = s;
  if (inStr) repaired += '"';
  // retire une éventuelle virgule/valeur pendante puis referme tout
  repaired = repaired.replace(/,\s*("[^"]*)?$/s, (m) => (inStr ? m : ""));
  for (let i = stack.length - 1; i >= 0; i--) repaired += stack[i];
  try { return JSON.parse(repaired); } catch (_) {
    // dernier recours : couper au dernier point sûr et refermer
    let cut = s.slice(0, lastSafe + 1).replace(/,\s*$/, "");
    const st2 = [];
    let str2 = false, esc2 = false;
    for (const c of cut) {
      if (str2) { if (esc2) esc2 = false; else if (c === "\\") esc2 = true; else if (c === '"') str2 = false; continue; }
      if (c === '"') str2 = true;
      else if (c === "{") st2.push("}");
      else if (c === "[") st2.push("]");
      else if (c === "}" || c === "]") st2.pop();
    }
    for (let i = st2.length - 1; i >= 0; i--) cut += st2[i];
    return JSON.parse(cut);
  }
}

async function callAnthropic(prompt, { search = false, maxTokens = 4000 } = {}) {
  const body = {
    model: CFG.model(),
    max_tokens: maxTokens,
    messages: [{ role: "user", content: prompt }],
  };
  if (search) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": CFG.key(),
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const data = await response.json();
  if (data.error) {
    if (data.error.type === "authentication_error") throw new Error("NO_KEY");
    throw new Error(data.error.message || "Erreur API");
  }
  return (data.content || []).map((i) => (i.type === "text" ? i.text : "")).filter(Boolean).join("\n");
}

async function callGemini(prompt, { maxTokens = 4000 } = {}) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="
    + encodeURIComponent(CFG.gkey());
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: maxTokens, temperature: 0.6 },
    }),
  });
  const data = await response.json();
  if (data.error) {
    if (data.error.code === 400 || data.error.code === 401 || data.error.code === 403) throw new Error("NO_KEY");
    if (data.error.code === 429) throw new Error("Quota gratuit Gemini atteint pour l'instant — patientez une minute puis réessayez.");
    throw new Error(data.error.message || "Erreur API Gemini");
  }
  const cand = data.candidates && data.candidates[0];
  return ((cand && cand.content && cand.content.parts) || []).map((p) => p.text || "").join("\n");
}

async function callClaude(prompt, opts = {}) {
  if (!CFG.activeKey()) throw new Error("NO_KEY");
  return CFG.provider() === "gemini" ? callGemini(prompt, opts) : callAnthropic(prompt, opts);
}
const wait = (ms) => new Promise((r) => setTimeout(r, ms));

/* Appel + parse, avec tentatives automatiques espacées (les erreurs serveur
   sont souvent passagères : on attend avant de réessayer). */
async function callAndParse(prompt, opts, tries = 3) {
  let lastErr;
  for (let i = 0; i < tries; i++) {
    try {
      return parseJsonLoose(await callClaude(prompt, opts));
    } catch (e) {
      lastErr = e;
      console.warn(`Tentative ${i + 1}/${tries} échouée :`, e.message);
      if (i < tries - 1) await wait(1800 * (i + 1));
    }
  }
  throw lastErr;
}

const ROLE = `Tu es consultant senior en développement commercial au sein du cabinet ACCCOM. Tu rédiges des livrables destinés à être présentés directement au client final : ton professionnel, précis, concret, orienté résultats, en français.`;

/* Étape 1 — analyse externe + SWOT. D'abord avec recherche web ;
   si elle est indisponible (erreur serveur), repli sur les connaissances du modèle. */
async function generateExterneSwot(form) {
  const corps = (avecRecherche) => `${ROLE}

ÉTAPE 1 : ANALYSE EXTERNE ET SWOT.
Le client n'a pas fourni d'analyse externe. C'est à toi de la produire. ${avecRecherche
    ? `Utilise la recherche web pour étudier le marché du secteur "${form.secteur}" dans la zone "${form.zone || "France"}"`
    : `À partir de ta connaissance du secteur "${form.secteur}" en France (zone : "${form.zone || "France"}"), analyse`} : dynamique et tendances du marché, environnement concurrentiel type, évolutions réglementaires récentes ou à venir, saisonnalité. Reste factuel. Rédige entièrement avec tes propres mots, sans citer ni recopier de passages de sources.

Puis construis un SWOT précis et argumenté :
- Forces et Faiblesses : à partir des données internes de l'audit ci-dessous.
- Opportunités et Menaces : à partir de ton analyse externe.
Chaque élément doit être SPÉCIFIQUE à cette entreprise (jamais générique), avec un titre court et un détail d'une ou deux phrases. 3 à 5 éléments par quadrant.

DONNÉES D'AUDIT :
${dataBlock(form)}

Réponds UNIQUEMENT avec un objet JSON valide, sans backticks, sans texte avant ou après, au format exact :
{
  "externe": {
    "marche": "3-4 phrases sur la dynamique et les tendances du marché",
    "concurrence": "3-4 phrases sur l'environnement concurrentiel",
    "reglementation": "2-3 phrases sur le cadre réglementaire et ses évolutions",
    "saisonnalite": "1-2 phrases sur la saisonnalité de l'activité"
  },
  "swot": {
    "forces": [{"titre":"string","detail":"string"}],
    "faiblesses": [{"titre":"string","detail":"string"}],
    "opportunites": [{"titre":"string","detail":"string"}],
    "menaces": [{"titre":"string","detail":"string"}]
  }
}`;
  if (CFG.search() && CFG.provider() === "anthropic") {
    try {
      return await callAndParse(corps(true), { search: true, maxTokens: 4000 }, 2);
    } catch (e) {
      if (e.message === "NO_KEY") throw e;
      console.warn("Recherche web indisponible, repli sur les connaissances du modèle :", e.message);
    }
  }
  return callAndParse(corps(false), { search: false, maxTokens: 4000 }, 3);
}

/* Étape 2 — synthèse exécutive + axes stratégiques (appel court) */
async function generateSyntheseAxes(form, externe, swot) {
  const prompt = `${ROLE}

1. Une synthèse exécutive du diagnostic (4-5 phrases maximum).
2. 3 ou 4 axes stratégiques prioritaires issus du croisement du SWOT et des objectifs du client.

DONNÉES D'AUDIT :
${dataBlock(form)}

ANALYSE EXTERNE : ${JSON.stringify(externe)}
SWOT : ${JSON.stringify(swot)}

Réponds UNIQUEMENT avec un objet JSON valide, sans backticks, sans texte avant ou après, au format exact :
{ "synthese": "string", "axes": ["string"] }`;

}

/* Étape 3 — le plan, généré phase par phase (appels courts et fiables) */
const PHASE_DEFS = [
  { periode: "0–30 jours", role: "les FONDATIONS : structurer, outiller, préparer le terrain" },
  { periode: "31–60 jours", role: "le DÉPLOIEMENT : exécuter, prospecter, mesurer les premiers résultats" },
  { periode: "61–90 jours", role: "l'ACCÉLÉRATION : optimiser ce qui fonctionne, pérenniser, ancrer les routines" },
];

async function generatePhase(form, externe, swot, axes, idx, total, phasesPrecedentes) {
  const def = PHASE_DEFS[idx];
  const autres = PHASE_DEFS.slice(0, total).filter((_, j) => j !== idx)
    .map((p) => `${p.periode} (${p.role})`).join(" ; ");
  const rappel = total > 1
    ? `\nIMPORTANT — CLOISONNEMENT : les autres phases du plan sont rédigées séparément (${autres}). Ne planifie ICI que ce qui relève strictement du rôle de ta phase. Une action de fondation ne doit pas apparaître en phase de déploiement, et inversement.\n`
    : "";
  const prompt = `${ROLE}

Tu rédiges la phase ${idx + 1} sur ${total} du plan d'action commercial : ${def.periode}, dont le rôle est ${def.role}.
Produis : un objectif de phase (une phrase), 4 à 6 actions concrètes (titre, description opérationnelle précise indiquant COMMENT faire, responsable suggéré, KPI mesurable avec une cible chiffrée réaliste), et 2 à 4 livrables de fin de phase. Chaque action doit être reliée à un constat du SWOT, à un axe stratégique ou à un objectif exprimé.

DONNÉES D'AUDIT :
${dataBlock(form)}

ANALYSE EXTERNE : ${JSON.stringify(externe)}
SWOT : ${JSON.stringify(swot)}
${axes && axes.length ? "AXES STRATÉGIQUES : " + JSON.stringify(axes) : ""}
${rappel}
Réponds UNIQUEMENT avec un objet JSON valide, sans backticks, sans texte avant ou après, au format exact :
{
  "periode": "${def.periode}",
  "objectif": "string",
  "actions": [{"titre":"string","description":"string","responsable":"string","kpi":"string"}],
  "livrables": ["string"]
}`;
  return callAndParse(prompt, { search: false, maxTokens: 2500 }, 3);
}

/* Orchestration : le SWOT d'abord, puis TOUT le reste en parallèle
   (synthèse, axes et chaque phase du plan partent en même temps). */
async function generateAnalysis(form, onStage) {
  const nb = form.duree === "30" ? 1 : form.duree === "60" ? 2 : 3;

  onStage && onStage("Étape 1 / 2 — Analyse externe du marché et construction du SWOT…");
  const step1 = await generateExterneSwot(form);
  if (!step1.swot) throw new Error("SWOT manquant dans la réponse");
  const externe = step1.externe || {};

  onStage && onStage("Étape 2 / 2 — Synthèse, axes stratégiques et phases du plan (en parallèle)…");
  // La synthèse/axes et chaque phase partent simultanément : le temps total
  // est celui du plus long appel, pas la somme de tous.
  const axesQuick = null; // les phases reçoivent les axes via le SWOT et les objectifs
  const [step2, ...phases] = await Promise.all([
    generateSyntheseAxes(form, externe, step1.swot),
    ...Array.from({ length: nb }, (_, i) =>
      generatePhase(form, externe, step1.swot, axesQuick, i, nb, [])
    ),
  ]);

  return {
    externe: step1.externe || null,
    swot: step1.swot,
    synthese: step2.synthese || "",
    axes: step2.axes || [],
    plan: phases,
  };
}

function Logo({ size = 26 }) {
  const gid = React.useId().replace(/[^a-zA-Z0-9]/g, "");
  const letters = ["A", "C", "C", "C", "O", "M"];
  const textRefs = useRef([]);
  const [layout, setLayout] = useState(null);
  const GAP = -3;        // lettres quasiment collées
  const SIDE_PAD = 6;    // marge pour que le M ne soit jamais rogné
  const ANGLE = 45;      // rotation horizontale des arceaux (C, C, C, O) vers la droite

  useLayoutEffect(() => {
    let cancelled = false;
    function measure() {
      if (cancelled) return;
      const boxes = textRefs.current.map((el) => el && el.getBBox());
      if (!boxes.every((b) => b && b.width > 0)) { requestAnimationFrame(measure); return; }

      let cursor = SIDE_PAD;
      const positions = [];
      boxes.forEach((b) => { positions.push(cursor - b.x); cursor += b.width + GAP; });
      const totalWidth = cursor - GAP + SIDE_PAD;

      const SC = Math.cos((ANGLE * Math.PI) / 180); // écrasement horizontal dû à la rotation
      // pour chaque arceau (indices 1..4 : C, C, C, O) : centre, empreinte, et bords VISIBLES
      // après écrasement (visLeft/visRight), qui servent à borner tube et couleurs.
      const rot = [1, 2, 3, 4].map((i) => {
        const b = boxes[i];
        const cx = positions[i] + b.x + b.width / 2;
        return {
          i, cx, x: positions[i] + b.x, y: b.y, w: b.width, h: b.height,
          visLeft: cx - (b.width / 2) * SC,
          visRight: cx + (b.width / 2) * SC,
        };
      });
      const o = boxes[4];

      // Le tube : du bord gauche visible du 1er C au bord droit visible du O.
      const tubeX = rot[0].visLeft;
      const tubeRight = rot[3].visRight;
      const tubeW = tubeRight - tubeX;
      const tubeH = o.height * 0.5;               // assez haut pour couvrir tout le creux des lettres
      // centre vertical = milieu commun des 4 arceaux (leurs bbox partagent la ligne de base,
      // donc leur centre vertical est identique) → le tube est parfaitement centré sur le creux.
      // Comme le tube est plus haut que le creux, la couleur remplit TOUT l'intérieur de la
      // lettre : ses frontières visibles dans le creux sont les courbes intérieures de la
      // lettre elle-même — donc rigoureusement lisses, en haut comme en bas. L'excédent est
      // recouvert à gauche par la partie avant, et à droite il passe DEVANT le trait arrière :
      // c'est l'effet arceau (les extrémités du C s'enfoncent derrière le tube).
      const midY = rot.reduce((a, r) => a + (r.y + r.h / 2), 0) / rot.length;
      const tubeY = midY - tubeH / 2;
      const oCx = rot[3].cx, oCy = midY;

      setLayout({
        positions, totalWidth, tubeX, tubeRight, tubeW, tubeY, tubeH, oCx, oCy, rot, SC,
        // frontières de couleur = AU MILIEU de la partie gauche de chaque lettre (entre son
        // bord gauche visible et son centre), là où la matière de la lettre est pleine à la
        // hauteur du tube. Le changement de teinte se produit donc pile SOUS la partie gauche
        // qui le recouvre — invisible. (visLeft = avant la lettre = encore dans le tube nu,
        // donc visible ; cx = trop à droite ; le milieu des deux est le bon point.)
        cut2: (rot[1].visLeft + rot[1].cx) / 2,
        cut3: (rot[2].visLeft + rot[2].cx) / 2,
        cutO: (rot[3].visLeft + rot[3].cx) / 2,
      });
    }
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
    else measure();
    return () => { cancelled = true; };
  }, []);

  const vbH = 92;
  const vbW = layout ? layout.totalWidth : 320;
  const h = size * 1.8, w = h * (vbW / vbH);

  // les 4 segments de couleur du tube, bornes calées sur les centres des lettres
  const seg = layout ? [
    { x: layout.tubeX, w: layout.cut2 - layout.tubeX, fill: "var(--plum)" },
    { x: layout.cut2, w: layout.cut3 - layout.cut2, fill: "var(--coral)" },
    { x: layout.cut3, w: layout.cutO - layout.cut3, fill: "var(--ocre)" },
    { x: layout.cutO, w: layout.tubeRight - layout.cutO, fill: "var(--ocre-light)" },
  ] : [];

  // le transform de rotation d'un arceau : scale-X centré sur son cx
  const tf = (r) => `translate(${r.cx} 0) scale(${layout.SC} 1) translate(${-r.cx} 0)`;

  return (
    <svg className="logo" width={w} height={h} viewBox={`0 0 ${vbW} ${vbH}`}
      role="img" aria-label="ACCCOM" style={{ maxWidth: "100%", height: "auto", opacity: layout ? 1 : 0 }}>
      {layout && (
        <defs>
          {/* chaque arceau est défini UNE fois puis réutilisé (<use>) pour l'avant et l'arrière
             du tube : le trait est donc rigoureusement identique des deux côtés, sans liseré. */}
          {layout.rot.map((r, j) => (
            <text key={j} id={"L" + j + gid} x={layout.positions[r.i]} y="63" className="lg"
              fill={j === 3 ? "#FFFFFF" : "var(--ink)"}>{letters[r.i]}</text>
          ))}
          {/* capsule du tube, pour y découper le color-blocking */}
          <clipPath id={"tube" + gid}>
            <rect x={layout.tubeX} y={layout.tubeY} width={layout.tubeW} height={layout.tubeH} rx={layout.tubeH / 2} />
          </clipPath>
          {/* demi-plan gauche de chaque arceau (sa partie avant), coupé au centre cx */}
          {layout.rot.map((r, j) => (
            <clipPath key={j} id={"front" + j + gid}>
              <rect x={r.cx - vbW} y="-20" width={vbW} height={vbH + 40} />
            </clipPath>
          ))}
        </defs>
      )}

      {/* 1) A et M, à plat, en arrière-plan */}
      {[0, 5].map((i) => (
        <text key={i} ref={(el) => (textRefs.current[i] = el)} x={layout ? layout.positions[i] : 0}
          y="63" className="lg">{letters[i]}</text>
      ))}
      {/* refs de mesure pour les arceaux (invisibles, servent juste au getBBox) */}
      {[1, 2, 3, 4].map((i) => (
        <text key={"m" + i} ref={(el) => (textRefs.current[i] = el)} x={layout ? layout.positions[i] : 0}
          y="63" className="lg" opacity="0">{letters[i]}</text>
      ))}

      {layout && (
        <>
          {/* 2) l'ARRIÈRE des arceaux (moitié droite) — dessiné sous le tube, donc masqué par
             lui : ce sont les extrémités du C qui s'enfoncent derrière le tube. */}
          {layout.rot.map((r, j) => (
            <g key={"back" + j} transform={tf(r)}>
              <use href={"#L" + j + gid} />
            </g>
          ))}

          {/* 3) le TUBE : color-blocking, une couleur par section, frontières masquées par les
             moitiés-avant des lettres redessinées juste après. */}
          <g clipPath={"url(#tube" + gid + ")"}>
            {seg.map((sgm, k) => (
              <rect key={k} x={sgm.x} y={layout.tubeY} width={sgm.w} height={layout.tubeH} style={{ fill: sgm.fill }} />
            ))}
          </g>

          {/* 4) l'AVANT des arceaux (moitié gauche) — redessiné PAR-DESSUS le tube, à partir du
             même <use> : parfaitement aligné avec l'arrière, trait continu, et il recouvre la
             frontière de couleur. Groupe externe = clip à la forme du TUBE (capsule), groupe
             interne = rotation + demi-plan gauche. L'avant n'apparaît donc QUE dans l'emprise du
             tube : hors du tube, la courbe de la lettre reste celle, lisse, du trait arrière. */}
          {layout.rot.map((r, j) => (
            <g key={"front" + j} clipPath={"url(#tube" + gid + ")"}>
              <g transform={tf(r)} clipPath={"url(#front" + j + gid + ")"}>
                <use href={"#L" + j + gid} />
              </g>
            </g>
          ))}
        </>
      )}
    </svg>
  );
}

          {(ph.actions || []).map((a, j) => (
            <div key={j} className="action">

/* ---------------- export du document (impression PDF) ---------------- */
function exportDocument(client) {
  const zone = document.querySelector(".print-zone");
  if (!zone) return false;
  const name = (client.form.entreprise || "client").replace(/[^\p{L}\p{N}]+/gu, "-");
  const html = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACCCOM — ${client.form.entreprise} — Plan d'action ${client.form.duree} jours</title>
<style>
${CSS}
body{ margin:0; background:#EDEFEC; font-family:'Onest',sans-serif;}
.export-wrap{ max-width:900px; margin:0 auto; padding:30px 16px;}
.docsheet{ background:#fff;}
.printbar{ position:sticky; top:0; z-index:50; display:flex; justify-content:center; gap:10px;
  padding:14px; background:rgba(240,233,229,.92); backdrop-filter:blur(6px); border-bottom:1px solid #E8DAD5;}
.printbar button{ font-family:'Onest',sans-serif; font-weight:600; font-size:15px; color:#fff;
  background:#7D4E66; border:none; border-radius:12px; padding:12px 26px; cursor:pointer;}
.printbar button:hover{ background:#5A3348;}
.printbar span{ align-self:center; font-size:13px; color:#6B5A5E;}
@media print{
  body{ background:#fff;}
  .printbar{ display:none;}
  .export-wrap{ max-width:none; padding:0;}
  .docsheet{ border:none; box-shadow:none; border-radius:0; padding:10px 0; margin:0;}
}
</style>
</head>
<body class="acd">
<div class="printbar">
  <button onclick="window.print()">Imprimer / Enregistrer en PDF</button>
  <span>Choisissez « Enregistrer au format PDF » comme imprimante.</span>
</div>
<div class="export-wrap">${zone.innerHTML}</div>
</body>
</html>`;
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ACCCOM_${name}_plan_${client.form.duree}j.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  return true;
}

            <dl className="kv">
              {Object.entries(FORM_LABELS).map(([k, lab]) =>
                f[k] ? (<React.Fragment key={k}><dt>{lab}</dt><dd>{f[k]}</dd></React.Fragment>) : null
              )}
            </dl>
          </div>
        </div>
      )}

      {tab === "docs" && (
        <div style={{ paddingBottom: 60 }}>
          <div className="doc-actions">
            <button className="btn btn-primary" onClick={onAddDoc}>+ Ajouter un document</button>
          </div>
          {(client.documents || []).length === 0 && (
            <div className="empty">
              <div className="big">Aucun document</div>
              <p>Ajoutez ici vos comptes rendus, notes de suivi, avenants ou tout autre document lié à ce client.</p>
            </div>
          )}
          {(client.documents || []).map((d) => (
            <div key={d.id} className="doc-row">
              <div className="d-head" onClick={() => setOpenDoc(openDoc === d.id ? null : d.id)}>
                <b>{d.titre}</b>
                <span>{fmtDate(d.date)} {openDoc === d.id ? "▴" : "▾"}</span>
              </div>
              {openDoc === d.id && (
                <div className="d-body">
                  {d.contenu}
                  <div style={{ marginTop: 12 }}>
                    <button className="btn btn-danger" onClick={() => onDeleteDoc(d.id)}>Supprimer ce document</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------- Add document modal ---------------- */
function DocModal({ onClose, onSave }) {
  const [titre, setTitre] = useState("");
  const [contenu, setContenu] = useState("");
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Ajouter un document</h3>
        <Field label="Titre du document"><input value={titre} onChange={(e) => setTitre(e.target.value)} placeholder="Ex. Compte rendu de suivi — semaine 3" autoFocus /></Field>
        <Field label="Contenu" hint="collez ou rédigez le texte du document">
          <textarea style={{ minHeight: 180 }} value={contenu} onChange={(e) => setContenu(e.target.value)} /></Field>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
          <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" disabled={!titre.trim()} onClick={() => onSave(titre.trim(), contenu)}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}


/* ---------------- Réglages (clé API, vitesse, données) ---------------- */
function SettingsModal({ onClose, onDataChanged }) {
  const [provider, setProvider] = useState(CFG.provider());
  const [key, setKey] = useState(CFG.key());
  const [gkey, setGkey] = useState(CFG.gkey());
  const [model, setModel] = useState(CFG.model());
  const [search, setSearch] = useState(CFG.search());
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);

  const save = () => {
    CFG.set("provider", provider);
    CFG.set("apikey", key.trim());
    CFG.set("gkey", gkey.trim());
    CFG.set("model", model);
    CFG.set("search", search ? "1" : "0");
    onClose();
  };

  const exporter = () => {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith("acccom:") && k !== "acccom:apikey" && k !== "acccom:gkey") data[k] = localStorage.getItem(k);
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "acccom-sauvegarde-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    setMsg("Sauvegarde téléchargée. Conservez ce fichier ou importez-le sur un autre poste.");
  };

  const importer = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        let n = 0;
        for (const [k, v] of Object.entries(data)) {
          if (k.startsWith("acccom:") && k !== "acccom:apikey" && k !== "acccom:gkey") { localStorage.setItem(k, v); n++; }
        }
        setMsg(n + " éléments restaurés. Vos dossiers sont à jour sur ce poste.");
        onDataChanged && onDataChanged();
      } catch (err) { setMsg("Fichier illisible : " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Réglages</h3>
        <Field label="Fournisseur d'IA">
          <div className="duree" style={{ gridTemplateColumns: "1fr 1fr" }}>
            <button type="button" className={provider === "anthropic" ? "sel" : ""}
              onClick={() => setProvider("anthropic")}>
              <div className="d-num">Claude</div>
              <div className="d-lab">Payant à l'usage (~2-5 ct/diagnostic) — meilleure qualité, données non utilisées pour l'entraînement</div>
            </button>
            <button type="button" className={provider === "gemini" ? "sel" : ""}
              onClick={() => setProvider("gemini")}>
              <div className="d-num">Gemini</div>
              <div className="d-lab">Gratuit (quotas journaliers) — Google peut utiliser les données envoyées pour améliorer ses services</div>
            </button>
          </div>
        </Field>
        {provider === "anthropic" && (
          <Field label="Clé API Anthropic" hint="créée sur console.anthropic.com — elle reste dans votre navigateur, jamais transmise ailleurs qu'à l'API">
            <input type="password" value={key} onChange={(e) => setKey(e.target.value)} placeholder="sk-ant-…" />
          </Field>
        )}
        {provider === "gemini" && (
          <>
            <Field label="Clé API Google Gemini" hint="créée gratuitement sur aistudio.google.com (bouton « Get API key ») — elle reste dans votre navigateur">
              <input type="password" value={gkey} onChange={(e) => setGkey(e.target.value)} placeholder="AIza…" />
            </Field>
            <div className="export-note" style={{ marginBottom: 16 }}>
              Confidentialité : sur le palier gratuit, Google peut exploiter le contenu envoyé (vos données d'audit) pour améliorer ses services. Évitez d'y saisir des informations sensibles ou nominatives, ou anonymisez le formulaire — pour les dossiers confidentiels, préférez Claude.
            </div>
          </>
        )}
        {provider === "anthropic" && (
        <Field label="Vitesse de génération">
          <div className="duree" style={{ gridTemplateColumns: "1fr 1fr" }}>
            <button type="button" className={model === "claude-haiku-4-5" ? "sel" : ""}
              onClick={() => setModel("claude-haiku-4-5")}>
              <div className="d-num">Rapide</div>
              <div className="d-lab">Idéal en rendez-vous (modèle Haiku)</div>
            </button>
            <button type="button" className={model === "claude-sonnet-4-6" ? "sel" : ""}
              onClick={() => setModel("claude-sonnet-4-6")}>
              <div className="d-num">Approfondi</div>
              <div className="d-lab">Analyse plus fouillée (modèle Sonnet)</div>
            </button>
          </div>
        </Field>
        )}
        {provider === "anthropic" && (
        <Field label="Recherche web pour l'analyse externe" hint="plus précis mais nettement plus lent — à désactiver en rendez-vous">
          <label style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 14, fontWeight: 400, cursor: "pointer" }}>
            <input type="checkbox" checked={search} onChange={(e) => setSearch(e.target.checked)}
              style={{ width: 18, height: 18, accentColor: "var(--pine)" }} />
            Activer la recherche web (sinon l'IA s'appuie sur ses connaissances du secteur)
          </label>
        </Field>
        )}
        <Field label="Vos données" hint="dossiers et documents de ce navigateur">
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <button className="btn btn-soft" onClick={exporter}>Exporter une sauvegarde</button>
            <button className="btn btn-soft" onClick={() => fileRef.current && fileRef.current.click()}>Importer une sauvegarde</button>
            <input ref={fileRef} type="file" accept="application/json" style={{ display: "none" }} onChange={importer} />
          </div>
        </Field>
        {msg && <div className="export-note">{msg}</div>}
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
          <button className="btn btn-ghost" onClick={onClose}>Fermer</button>
          <button className="btn btn-primary" onClick={save}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- App ---------------- */
function App() {
  const [view, setView] = useState("home"); // home | form | clients | client
  const [index, setIndex] = useState([]);
  const [current, setCurrent] = useState(null); // client data
  const [editMode, setEditMode] = useState(false);
  const [busy, setBusy] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [genStage, setGenStage] = useState("");
  const [genError, setGenError] = useState(null);
  const [showDocModal, setShowDocModal] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [ready, setReady] = useState(false);
  const [dark, setDark] = useState(false);

  useEffect(() => {
    (async () => {
      setIndex(await loadIndex());
      try {
        const t = await appStorage.get("acdcom:theme");
        if (t && t.value === "dark") setDark(true);
      } catch (_) { /* pas de préférence enregistrée */ }
      setReady(true);
    })();
  }, []);

  const toggleTheme = async () => {
    const next = !dark;
    setDark(next);
    try { await appStorage.set("acdcom:theme", next ? "dark" : "light"); } catch (e) { console.error(e); }
  };

  const refreshIndex = async (updated) => { setIndex(updated); await saveIndex(updated); };

  const openClient = async (id) => {
    const c = await loadClient(id);
    if (c) { setCurrent({ id, ...c }); setGenError(null); setView("client"); }
  };

  const persistCurrent = async (data) => {
    const { id, ...rest } = data;
    await saveClient(id, rest);
    const entry = {
      id, nom: rest.form.entreprise, secteur: rest.form.secteur, duree: rest.form.duree,
      createdAt: rest.createdAt, updatedAt: rest.updatedAt, hasResult: !!rest.result,
    };
    const next = [...index.filter((c) => c.id !== id), entry];
    await refreshIndex(next);
    setCurrent(data);
  };

  const runGeneration = async (data) => {
    if (!CFG.activeKey()) {
      setShowSettings(true);
      setGenError(CFG.provider() === "gemini"
        ? "Renseignez d'abord votre clé Gemini gratuite dans les réglages (bouton ⚙ en haut à droite)."
        : "Renseignez d'abord votre clé API Anthropic dans les réglages (bouton ⚙ en haut à droite).");
      return;
    }
    setGenerating(true); setGenError(null); setGenStage("");
    try {
      const result = await generateAnalysis(data.form, setGenStage);
      const updated = { ...data, result, resultAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      await persistCurrent(updated);
    } catch (e) {
      console.error(e);
      if (e.message === "NO_KEY") {
        setShowSettings(true);
        setGenError("Clé API absente ou invalide — vérifiez-la dans les réglages (bouton ⚙).");
      } else {
        setGenError(e.message || "erreur inconnue");
      }
    } finally { setGenerating(false); }
  };

  const handleSubmitForm = async (form) => {
    setBusy(true);
    try {
      const now = new Date().toISOString();
      let data;
      if (editMode && current) {
        data = { ...current, form, updatedAt: now };
      } else {
        data = { id: uid(), form, documents: [], result: null, createdAt: now, updatedAt: now };
      }
      await persistCurrent(data);
      setView("client");
      runGeneration(data);
    } finally { setBusy(false); setEditMode(false); }
  };

  const handleAddDoc = async (titre, contenu) => {
    const doc = { id: uid(), titre, contenu, date: new Date().toISOString() };
    const updated = { ...current, documents: [doc, ...(current.documents || [])], updatedAt: new Date().toISOString() };
    await persistCurrent(updated);
    setShowDocModal(false);
  };

  const handleDeleteDoc = async (docId) => {
    const updated = { ...current, documents: (current.documents || []).filter((d) => d.id !== docId), updatedAt: new Date().toISOString() };
    await persistCurrent(updated);
  };

  const handleDeleteClient = async () => {
    if (!window.confirm("Supprimer définitivement ce dossier client ?")) return;
    await deleteClient(current.id);
    await refreshIndex(index.filter((c) => c.id !== current.id));
    setCurrent(null); setView("clients");
  };

  return (
    <div className={"acd" + (dark ? " dark" : "")}>
      <style>{CSS}</style>
      <div className="topbar">
        <div className="wrap topbar-in">
          <Wordmark onClick={() => { setView("home"); setCurrent(null); }} />
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div className="crumb">
              {view !== "home" && <button onClick={() => setView("home")}>Accueil</button>}
              {(view === "clients" || view === "client") && <><span>/</span><button onClick={() => { setView("clients"); setCurrent(null); }}>Dossiers</button></>}
              {view === "client" && current && <><span>/</span><span>{current.form.entreprise}</span></>}
              {view === "form" && <><span>/</span><span>{editMode ? "Modification" : "Nouvel audit"}</span></>}
            </div>
            <button className="theme-btn" onClick={() => setShowSettings(true)}
              title="Réglages" aria-label="Réglages">⚙</button>
            <button className="theme-btn" onClick={toggleTheme}
              title={dark ? "Passer en mode clair" : "Passer en mode sombre"}
              aria-label={dark ? "Passer en mode clair" : "Passer en mode sombre"}>
              {dark ? "☀" : "☾"}
            </button>
          </div>
        </div>
      </div>

      {!ready && <div className="gen-overlay"><div className="spin" /><p>Chargement…</p></div>}

      {ready && view === "home" && (
        <Home count={index.length}
          onNew={() => { setEditMode(false); setCurrent(null); setView("form"); }}
          onClients={() => setView("clients")} />
      )}

      {ready && view === "form" && (
        <AuditForm
          initial={editMode && current ? current.form : null}
          busy={busy}
          onCancel={() => setView(editMode ? "client" : "home")}
          onSubmit={handleSubmitForm} />
      )}

      {ready && view === "clients" && (
        <ClientList index={index} onOpen={openClient}
          onNew={() => { setEditMode(false); setCurrent(null); setView("form"); }} />
      )}

      {ready && view === "client" && current && (
        <ClientDetail
          client={current}
          generating={generating}
          genStage={genStage}
          genError={genError}
          onBack={() => { setView("clients"); setCurrent(null); }}
          onEditAudit={() => { setEditMode(true); setView("form"); }}
          onRegenerate={() => runGeneration(current)}
          onAddDoc={() => setShowDocModal(true)}
          onDeleteDoc={handleDeleteDoc}
          onDelete={handleDeleteClient} />
      )}

      {showDocModal && <DocModal onClose={() => setShowDocModal(false)} onSave={handleAddDoc} />}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)}
        onDataChanged={async () => setIndex(await loadIndex())} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
